name: iOS Build

on:
  push:
    branches: [main]
    paths:
      - "CustomsTracker/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "CustomsTracker/**"
      - ".github/workflows/ios-build.yml"
  workflow_dispatch: {}

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: CustomsTracker/iosApp
        run: xcodegen generate

      - name: Make gradlew executable
        working-directory: CustomsTracker
        run: chmod +x gradlew

      - name: Pick an available iOS simulator
        id: sim
        run: |
          set -e
          DEVICE_LINE=$(xcrun simctl list devices available | grep -E "iPhone" | head -n 1)
          DEVICE_ID=$(echo "$DEVICE_LINE" | grep -oE "[0-9A-F-]{36}")
          echo "Selected simulator: $DEVICE_LINE"
          echo "id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Build iOS app (triggers shared Kotlin framework build via Gradle)
        working-directory: CustomsTracker/iosApp
        run: |
          xcodebuild \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -sdk iphonesimulator \
            -destination "id=${{ steps.sim.outputs.id }}" \
            -derivedDataPath build \
            build

      - name: Boot simulator and launch app
        working-directory: CustomsTracker/iosApp
        run: |
          set -e
          DEVICE_ID="${{ steps.sim.outputs.id }}"
          xcrun simctl boot "$DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID" -b
          APP_PATH=$(find build/Build/Products -name "*.app" -maxdepth 2 | head -n 1)
          xcrun simctl install "$DEVICE_ID" "$APP_PATH"
          xcrun simctl launch "$DEVICE_ID" com.rms.customs.ios
          sleep 3
          mkdir -p screenshots
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/launch.png

      - name: Upload launch screenshot
        uses: actions/upload-artifact@v4
        with:
          name: ios-launch-screenshot
          path: CustomsTracker/iosApp/screenshots/launch.png
